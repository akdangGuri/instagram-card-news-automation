<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>카드뉴스 제작기</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <header class="brand">
          <p>Instagram Card Studio</p>
          <h1>카드뉴스 제작기</h1>
        </header>

        <section class="panel">
          <h2>콘텐츠</h2>
          <label>
            주제
            <input id="topic" type="text" value="자영업자를 위한 세금 절약 체크리스트">
          </label>
          <label>
            원고/자료
            <textarea id="sourceText" rows="6" placeholder="블로그 글, 영상 대본, 상품 설명, 메모 등을 넣어주세요."></textarea>
          </label>
          <div class="two-col">
            <label>
              카드 수
              <input id="cardCount" type="number" min="3" max="10" value="7">
            </label>
            <label>
              톤
              <select id="tone">
                <option value="practical">실용적</option>
                <option value="friendly">친근한</option>
                <option value="expert">전문적인</option>
              </select>
            </label>
          </div>
          <label>
            AI 엔진
            <select id="aiProvider">
              <option value="auto">자동 선택</option>
              <option value="openai">GPT API</option>
              <option value="gemini">Gemini API</option>
              <option value="local">로컬 샘플</option>
            </select>
          </label>
          <button id="generateBtn" class="primary">카드뉴스 만들기</button>
          <p id="generateStatus" class="status-text"></p>
        </section>

        <section class="panel">
          <h2>스타일</h2>
          <div class="style-options" id="styleOptions">
            <button class="style-chip is-active" data-style="cream">크림 에디토리얼</button>
            <button class="style-chip" data-style="mono">블랙 미니멀</button>
            <button class="style-chip" data-style="pop">팝 후킹</button>
            <button class="style-chip" data-style="photo">사진 뉴스형</button>
            <button class="style-chip" data-style="premium">프리미엄 리포트</button>
          </div>
          <label>
            배경 사진
            <input id="backgroundImage" type="file" accept="image/*">
          </label>
          <label>
            브랜드명
            <input id="brandName" type="text" value="Auto News">
          </label>
          <label>
            레퍼런스 메모
            <textarea id="referenceNotes" rows="3" placeholder="예: 큰 제목, 크림색 배경, 초록 포인트, 여백 넓게"></textarea>
          </label>
        </section>

        <details class="panel collapsible-panel">
          <summary>API 설정</summary>
          <label>
            OpenAI API Key
            <input id="openaiKey" type="password" placeholder="sk-...">
          </label>
          <label>
            OpenAI 모델
            <input id="openaiModel" type="text" value="gpt-4.1-mini">
          </label>
          <label>
            Gemini API Key
            <input id="geminiKey" type="password" placeholder="AIza...">
          </label>
          <label>
            Gemini 모델
            <input id="geminiModel" type="text" value="gemini-2.5-flash">
          </label>
          <label>
            한국관광공사 TourAPI Key
            <input id="tourApiKey" type="password" placeholder="공공데이터포털 인증키">
          </label>
          <div class="two-col">
            <button id="saveApiBtn" type="button">API 저장</button>
            <button id="clearApiBtn" type="button" class="secondary">키 지우기</button>
          </div>
          <p id="apiStatus" class="status-text">키는 브라우저에 저장하지 않고 로컬 서버 메모리에만 보관됩니다.</p>
        </details>

        <details class="panel collapsible-panel" open>
          <summary>자동발행 설정</summary>
          <label>
            공개 URL
            <input id="publicBaseUrl" type="url" placeholder="https://your-tunnel.example.com">
          </label>
          <label>
            Instagram User ID
            <input id="igUserId" type="password" placeholder="Instagram Business/Creator ID">
          </label>
          <label>
            Instagram Access Token
            <input id="igAccessToken" type="password" placeholder="Meta 장기 액세스 토큰">
          </label>
          <label>
            Threads Account Label
            <input id="threadsLabel" type="text" placeholder="Festival card news">
          </label>
          <label>
            Threads User ID
            <input id="threadsUserId" type="password" placeholder="Threads User ID">
          </label>
          <label>
            Threads Access Token
            <input id="threadsAccessToken" type="password" placeholder="Threads 액세스 토큰">
          </label>
          <label>
            Threads Publish Account
            <select id="threadsAccountSelect">
              <option value="">Default Threads account</option>
            </select>
          </label>
          <p id="threadsAccountList" class="status-text">No Threads accounts connected.</p>
          <label>
            Facebook Page ID
            <input id="facebookPageId" type="password" placeholder="Facebook Page ID">
          </label>
          <label>
            Facebook Page Access Token
            <input id="facebookPageToken" type="password" placeholder="Page access token">
          </label>
          <button id="connectThreadsBtn" type="button" class="secondary">Threads 연결</button>
          <button id="connectFacebookPageBtn" type="button" class="secondary">Facebook 페이지 연결</button>
          <div class="two-col">
            <button id="saveSocialBtn" type="button">발행 설정 저장</button>
            <button id="clearSocialBtn" type="button" class="secondary">발행 키 지우기</button>
          </div>
          <p id="socialStatus" class="status-text">자동발행에는 Meta 권한과 공개 이미지 URL이 필요합니다.</p>
        </details>

        <section class="panel">
          <h2>축제 불러오기</h2>
          <label>
            검색어
            <input id="festivalKeyword" type="text" placeholder="예: 벚꽃, 불꽃, 음악">
          </label>
          <label>
            시작일 이후
            <input id="festivalStartDate" type="date">
          </label>
          <button id="searchFestivalBtn" type="button">축제 검색</button>
          <div id="festivalResults" class="festival-results"></div>
          <p id="festivalStatus" class="status-text"></p>
        </section>

        <section class="panel publish-panel">
          <h2>내보내기</h2>
          <div class="button-grid">
            <button id="downloadBtn">현재 카드 PNG</button>
            <button id="downloadAllBtn">전체 PNG</button>
            <button id="uploadCardsBtn" type="button">발행용 이미지 만들기</button>
            <button id="publishInstagramBtn" type="button">Instagram 발행</button>
            <button id="publishThreadsBtn" type="button">Threads 발행</button>
            <button id="publishFacebookBtn" type="button">Facebook 페이지 발행</button>
            <button id="publishBothBtn" type="button" class="primary">Instagram + Threads 발행</button>
            <button id="publishMetaBtn" type="button" class="primary">Instagram + Facebook 발행</button>
          </div>
          <p id="publishStatus" class="status-text"></p>
        </section>
      </aside>

      <section class="stage">
        <div class="stage-head">
          <div>
            <p class="eyebrow">Preview</p>
            <h2 id="deckTitle">자영업자를 위한 세금 절약 체크리스트</h2>
          </div>
          <div class="pager">
            <button id="prevBtn" aria-label="이전 카드">‹</button>
            <span id="pageLabel">1 / 7</span>
            <button id="nextBtn" aria-label="다음 카드">›</button>
          </div>
        </div>

        <div class="preview-wrap">
          <article id="cardPreview" class="card-preview"></article>
        </div>

        <div id="filmstrip" class="filmstrip"></div>
      </section>

      <aside class="editor">
        <header>
          <p class="eyebrow">Edit</p>
          <h2>문구 수정</h2>
        </header>
        <div id="cardEditors" class="card-editors"></div>
        <section class="caption-box">
          <h2>캡션</h2>
          <textarea id="caption" rows="8"></textarea>
        </section>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
